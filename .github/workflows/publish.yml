name: Build & Publish gen3-vectis

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "config/**"
      - "package.json"
      - "package-lock.json"
      - ".vendor/**"
      - "Dockerfile.production"
      - "next.config.js"
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "config/**"
      - "package.json"
      - "package-lock.json"
      - ".vendor/**"
      - "Dockerfile.production"
      - "next.config.js"
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to GHCR"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Push gen3-vectis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' || inputs.push_image == true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gen3-vectis
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.production
          push: ${{ github.ref == 'refs/heads/main' || inputs.push_image == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_GEN3_API_TARGET=${{ vars.NEXT_PUBLIC_GEN3_API_TARGET || 'https://gen3.example.com' }}
            NEXT_PUBLIC_MICRO_CONTAINER_TAG=${{ vars.NEXT_PUBLIC_MICRO_CONTAINER_TAG || 'micro-notebook-dev' }}
            NEXT_PUBLIC_JEG_ENABLED=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Multi-layer caching:
          # - npm install layer cached when package-lock.json unchanged (~30s on hit)
          # - Next.js build layer cached when src/ and pages/ unchanged (near-instant on hit)
          # - Final layer cached when everything unchanged (skip build entirely)
